name: Build Mi Bancolombia APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Compilar APK Android
    runs-on: ubuntu-latest

    steps:
      # ──────────────────────────────────────────────
      # 1. CÓDIGO FUENTE
      # ──────────────────────────────────────────────
      - name: Checkout código fuente
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────
      # 2. ENTORNO NODE + PNPM
      # ──────────────────────────────────────────────
      - name: Configurar Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Configurar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Instalar dependencias del workspace completo
        run: pnpm install --frozen-lockfile

      # ──────────────────────────────────────────────
      # 3. JAVA (requerido por Gradle / Android SDK)
      # ──────────────────────────────────────────────
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ──────────────────────────────────────────────
      # 4. ANDROID SDK
      # ──────────────────────────────────────────────
      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Aceptar licencias Android SDK
        run: yes | sdkmanager --licenses || true

      # ──────────────────────────────────────────────
      # 5. GENERAR PROYECTO NATIVO ANDROID
      #    expo prebuild crea la carpeta android/
      #    directamente desde app.json — sin EAS,
      #    sin cuenta de Expo, sin token.
      # ──────────────────────────────────────────────
      - name: Generar proyecto nativo Android con expo prebuild
        working-directory: artifacts/mi-bancolombia
        env:
          EXPO_PUBLIC_API_URL: https://bancolombia--appbancolombiav.replit.app
        run: |
          npx expo prebuild \
            --platform android \
            --clean \
            --no-install

      # ──────────────────────────────────────────────
      # 6. COMPILAR EL APK CON GRADLE
      #    assembleDebug produce un APK firmado con
      #    la clave de depuración (apta para instalar
      #    directamente sin Google Play).
      # ──────────────────────────────────────────────
      - name: Dar permisos a gradlew
        working-directory: artifacts/mi-bancolombia/android
        run: chmod +x gradlew

      - name: Compilar APK debug con Gradle
        working-directory: artifacts/mi-bancolombia/android
        env:
          EXPO_PUBLIC_API_URL: https://bancolombia--appbancolombiav.replit.app
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ──────────────────────────────────────────────
      # 7. PUBLICAR EL APK COMO ARTEFACTO DE GITHUB
      #    Ve a: Actions → última ejecución →
      #    "Artifacts" → Descargar mi-bancolombia-apk
      # ──────────────────────────────────────────────
      - name: Subir APK como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: mi-bancolombia-apk
          path: artifacts/mi-bancolombia/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
